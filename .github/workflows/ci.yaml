---
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: clone repository
        uses: actions/checkout@v6.0.3

      - name: install mise
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true

      - name: go tidy
        run: go mod tidy --diff

      - name: go mod
        run: go mod download

      - name: go mod verify
        run: go mod verify

      - name: run code checks
        run: make code-check
