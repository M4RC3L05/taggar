---
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: clone repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: install mise
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
      - name: release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.HOMEBREW_RELEASE_PAT }}
